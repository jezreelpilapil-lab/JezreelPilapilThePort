<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portfolio of Jezreel Aldave Pilapil — IT Technical Support, BPO Operations & Software Engineer" />
  <title>Jezreel Pilapil | Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#38bdf8',
            dark:  '#0f172a',
            card:  '#1e293b',
            muted: '#94a3b8'
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui']
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="bg-dark text-slate-300 font-sans antialiased">

  <!-- Navigation -->
  <nav id="navbar"></nav>

  <!-- Main app container — all sections injected here by script.js -->
  <main id="app"></main>

  <!-- Footer -->
  <footer id="footer"></footer>

  <!-- Hidden Icon (Bottom Left) -->
  <div id="hiddenIcon" class="fixed bottom-4 left-4 text-slate-700 hover:text-slate-500 cursor-pointer text-2xl opacity-30 transition-opacity">
    🔒
  </div>

  <!-- Command Line -->
  <div id="commandLine" class="fixed bottom-4 left-4 bg-slate-800 border border-slate-700 rounded-lg p-3 hidden flex gap-2 items-center shadow-lg">
    <span class="text-brand font-semibold">$</span>
    <input type="text" id="commandInput" class="bg-transparent border-none outline-none text-white w-64" placeholder="Type command..." />
  </div>

  <!-- Error Bubble -->
  <div id="errorBubble" class="fixed bottom-20 left-4 bg-red-500/90 text-white px-4 py-2 rounded-lg shadow-lg hidden">
    Bad or unknown command
  </div>

  <script src="script.js"></script>
</body>
</html>
